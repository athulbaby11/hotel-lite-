{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerala Street</title>

    <meta property="og:title" content="Kerala Street - Authentic Kerala Cuisine">

    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">

    </head>
    <body>
        <header class="site-header">

                <div class="container">

                    </button>
                    <div class="collapse navbar-collapse" id="mainNav">
                        <ul class="navbar-nav ms-auto">
                            {% if request.session.name == 'admin' %}
                                <li class="nav-item"><a class="nav-link" href="{% url 'index' %}">Home</a></li>
                                <li class="nav-item"><a class="nav-link" href="{% url 'admin_dashboard' %}">Dashboard</a></li>

                            {% else %}
                                <li class="nav-item"><a class="nav-link" href="{% url 'index' %}#home">Home</a></li>
                                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                                <li class="nav-item"><a class="nav-link" href="{% url 'menu_page' %}">Menu</a></li>

            </nav>

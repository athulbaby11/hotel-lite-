services:
  - type: web
    name: hotel-lite
    env: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn hotel.wsgi --log-file -
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: 127.0.0.1,localhost
